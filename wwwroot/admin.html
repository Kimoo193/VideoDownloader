<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f0f1a; color: #fff; }
        .header { background: #1a1a2e; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #6c63ff; font-size: 24px; }
        .login-box { background: #1a1a2e; max-width: 400px;
            margin: 100px auto; padding: 40px; border-radius: 12px; }
        .login-box h2 { color: #6c63ff; margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0;
            background: #0f0f1a; border: 1px solid #333;
            border-radius: 8px; color: #fff; font-size: 14px; }
        button { padding: 8px 16px; border: none;
            border-radius: 8px; cursor: pointer; font-size: 14px; }
        .btn-login { width: 100%; padding: 12px; background: #6c63ff;
            color: #fff; font-size: 16px; margin-top: 10px; }
        .btn-login:hover { background: #5a52d5; }
        .container { padding: 40px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1a1a2e; padding: 24px;
            border-radius: 12px; text-align: center; }
        .stat-card .number { font-size: 36px; font-weight: bold; color: #6c63ff; }
        .stat-card .label { color: #888; margin-top: 8px; font-size: 14px; }
        .search-bar { margin-bottom: 20px; }
        .search-bar input { max-width: 400px; display: inline-block;
            width: auto; margin-right: 10px; }
        table { width: 100%; background: #1a1a2e;
            border-radius: 12px; overflow: hidden; border-collapse: collapse; }
        th { background: #16213e; padding: 14px 16px;
            text-align: left; color: #888; font-size: 13px; }
        td { padding: 14px 16px; border-bottom: 1px solid #222; font-size: 13px; }
        tr:hover td { background: #16213e; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .badge.active  { background: #1a3a1a; color: #4caf50; }
        .badge.blocked { background: #3a1a1a; color: #f44336; }
        .actions { display: flex; gap: 8px; }
        .btn-block   { background: #f44336; color: #fff; }
        .btn-unblock { background: #4caf50; color: #fff; }
        .btn-delete  { background: #333; color: #f44336; border: 1px solid #f44336; }
        .btn-delete:hover { background: #f44336; color: #fff; }
        #loginSection     { display: block; }
        #dashboardSection { display: none; }
        .requests-badge { background: #1a1a3e; color: #6c63ff;
            padding: 4px 10px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div id="loginSection">
    <div class="login-box">
        <h2>🔐 Admin Dashboard</h2>
        <input type="password" id="adminKey" placeholder="Admin Key"
               onkeydown="if(event.key==='Enter') login()" />
        <button class="btn-login" onclick="login()">Login</button>
    </div>
</div>

<div id="dashboardSection">
    <div class="header">
        <h1>📱 Device Manager</h1>
        <span id="lastUpdate" style="color:#888; font-size:14px;"></span>
    </div>
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalDevices">0</div>
                <div class="label">Total Devices</div>
            </div>
            <div class="stat-card">
                <div class="number" id="activeDevices" style="color:#4caf50">0</div>
                <div class="label">Active Devices</div>
            </div>
            <div class="stat-card">
                <div class="number" id="blockedDevices" style="color:#f44336">0</div>
                <div class="label">Blocked Devices</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalRequests" style="color:#ff9800">0</div>
                <div class="label">Total Requests</div>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput"
                   placeholder="🔍 Search by name, OS, serial..."
                   oninput="loadDevices()" />
        </div>

        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Device Name</th>
                <th>OS</th>
                <th>Serial</th>
                <th>Registered At</th>
                <th>Last Seen</th>
                <th>Requests</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="devicesTable"></tbody>
        </table>
    </div>
</div>

<script>
    let adminKey = '';

    function login() {
        adminKey = document.getElementById('adminKey').value;
        if (!adminKey) return alert('Enter admin key');
        loadDevices();
    }

    async function loadDevices() {
        const search = document.getElementById('searchInput')?.value || '';
        try {
            const res = await fetch(`/api/admin/devices?search=${encodeURIComponent(search)}`, {
                headers: { 'X-Admin-Key': adminKey }
            });

            if (res.status === 401) return alert('Wrong admin key!');
            const devices = await res.json();

            document.getElementById('loginSection').style.display    = 'none';
            document.getElementById('dashboardSection').style.display = 'block';

            const totalReqs = devices.reduce((s, d) => s + d.requestCount, 0);
            document.getElementById('totalDevices').textContent   = devices.length;
            document.getElementById('activeDevices').textContent  = devices.filter(d => !d.isBlocked).length;
            document.getElementById('blockedDevices').textContent = devices.filter(d => d.isBlocked).length;
            document.getElementById('totalRequests').textContent  = totalReqs;
            document.getElementById('lastUpdate').textContent     = 'Last update: ' + new Date().toLocaleTimeString();

            document.getElementById('devicesTable').innerHTML = devices.map(d => `
                <tr>
                    <td>${d.id}</td>
                    <td><strong>${d.deviceName}</strong></td>
                    <td>${d.os}</td>
                    <td style="color:#888; font-size:11px">${d.serial}</td>
                    <td style="color:#888">${new Date(d.registeredAt).toLocaleDateString()}</td>
                    <td style="color:#888">${new Date(d.lastSeenAt).toLocaleString()}</td>
                    <td><span class="requests-badge">⚡ ${d.requestCount}</span></td>
                    <td><span class="badge ${d.isBlocked ? 'blocked' : 'active'}">
                        ${d.isBlocked ? '🔴 Blocked' : '🟢 Active'}
                    </span></td>
                    <td>
                        <div class="actions">
                            <button class="btn-block ${d.isBlocked ? 'btn-unblock' : 'btn-block'}"
                                onclick="${d.isBlocked ? 'unblock' : 'block'}Device(${d.id})">
                                ${d.isBlocked ? 'Unblock' : 'Block'}
                            </button>
                            <button class="btn-delete"
                                onclick="deleteDevice(${d.id}, '${d.deviceName}')">
                                Delete
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

        } catch (e) {
            alert('Error: ' + e.message);
        }
    }

    async function blockDevice(id) {
        await fetch(`/api/admin/block/${id}`, {
            method: 'POST', headers: { 'X-Admin-Key': adminKey }
        });
        loadDevices();
    }

    async function unblockDevice(id) {
        await fetch(`/api/admin/unblock/${id}`, {
            method: 'POST', headers: { 'X-Admin-Key': adminKey }
        });
        loadDevices();
    }

    async function deleteDevice(id, name) {
        if (!confirm(`Delete "${name}" permanently?`)) return;
        await fetch(`/api/admin/devices/${id}`, {
            method: 'DELETE', headers: { 'X-Admin-Key': adminKey }
        });
        loadDevices();
    }

    setInterval(() => { if (adminKey) loadDevices(); }, 30000);
</script>
</body>
</html>
